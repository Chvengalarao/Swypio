<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swypio Dashboard</title>

<style>
body{
  font-family: Arial;
  background:#f5f7ff;
  padding:15px;
}

.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:10px;
  margin-bottom:15px;
}

button{
  background:#1a237e;
  color:#fff;
  padding:10px;
  border:none;
  border-radius:6px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
}
</style>
</head>

<body>

<div class="header">
  <h2>Swypio Dashboard</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="card">
  <h3>Total Received</h3>
  <p id="total">₹0</p>
</div>

<div class="card">
  <h3>Create Payment Link</h3>
  <input type="number" id="amount" placeholder="Enter Amount">
  <button onclick="createLink()">Generate Link</button>
  <p id="link"></p>
</div>

<div class="card">
  <h3>Transactions</h3>
  <ul id="txList"></ul>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbypgdv1t-xNbeykrN6GFdAMz-N8e5hSh4fgZ7W93X-mOn5f1yljanPwHPFzBBE38A/exec";

function createLink(){
  let amount = document.getElementById("amount").value;

  fetch(API, {
    method:"POST",
    body: JSON.stringify({
      action:"create_link",
      amount: amount,
      user_id: "U1001"
    })
  })
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("link").innerText = data.link;
  });
}

function loadTransactions(){
  fetch(API + "?action=get_tx")
  .then(res=>res.json())
  .then(data=>{
    let list = document.getElementById("txList");
    list.innerHTML = "";

    data.forEach(tx=>{
      let li = document.createElement("li");
      li.innerText = "₹" + tx.amount + " - " + tx.status;
      list.appendChild(li);
    });
  });
}

function shareWhatsApp(link){
  let url = "https://wa.me/?text=Pay here: " + link;
  window.open(url);
}

loadTransactions();

</script>

</body>
</html>
