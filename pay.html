<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swypio Pay</title>

<style>
body{
  font-family: Arial;
  background:#f5f7ff;
  text-align:center;
  padding:20px;
}

.card{
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
  color:#1a237e;
}

.amount{
  font-size:2rem;
  margin:15px 0;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  margin:10px;
  font-size:1rem;
}

.pay-btn{
  background:#1a237e;
  color:#fff;
}

.success{
  color:green;
  font-size:1.2rem;
}

.qr{
  margin:15px 0;
}
</style>
</head>

<body>

<div class="card">

  <h2>Pay Securely</h2>

  <p id="status">Loading...</p>

  <div class="amount" id="amount">₹0</div>

  <!-- QR -->
  <img id="qr" class="qr" width="200"/>

  <br>

  <!-- UPI BUTTON -->
  <button class="pay-btn" id="upiBtn">Pay via UPI</button>

  <br>

  <!-- MANUAL CONFIRM -->
  <button onclick="markPaid()">I Have Paid</button>

  <p id="msg"></p>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbypgdv1t-xNbeykrN6GFdAMz-N8e5hSh4fgZ7W93X-mOn5f1yljanPwHPFzBBE38A/exec";

// Get link_id from URL
const urlParams = new URLSearchParams(window.location.search);
const link_id = urlParams.get("link_id");

let amount = 0;

/* ======================
   LOAD PAYMENT DATA
====================== */

function loadPayment(){

  fetch(API + "?action=get_links")
  .then(res=>res.json())
  .then(data=>{

    let found = data.find(item => item.link_id === link_id);

    if(!found){
      document.getElementById("status").innerText = "Invalid Link ❌";
      return;
    }

    amount = found.amount;

    document.getElementById("status").innerText = "Complete Your Payment";
    document.getElementById("amount").innerText = "₹" + amount;

    generateQR();
    setupUPI();

  });

}

/* ======================
   GENERATE QR
====================== */

function generateQR(){

  const upi = `upi://pay?pa=demo@upi&pn=Swypio&am=${amount}&cu=INR`;

  document.getElementById("qr").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(upi);

}

/* ======================
   UPI BUTTON
====================== */

function setupUPI(){

  const upi = `upi://pay?pa=demo@upi&pn=Swypio&am=${amount}&cu=INR`;

  document.getElementById("upiBtn").onclick = function(){
    window.location.href = upi;
  };

}

/* ======================
   MARK PAID
====================== */

function markPaid(){

  fetch(API,{
    method:"POST",
    body: JSON.stringify({
      action:"mark_paid",
      link_id: link_id
    })
  })
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("msg").innerHTML =
      "<span class='success'>Payment Successful ✅</span>";
  });

}

loadPayment();

</script>

</body>
</html>
